# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions
# Seb Harvey

name: Build and deploy - User Microservice

on:
  push:
    branches: [ main ]
    paths:
      - 'src/API/Microservices/ReservationSystem.Microservices.User/**'
      - 'src/API/Shared/**'
      - '.github/workflows/main_reservation-system-db-microservice-user.yml'

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'src/API/Microservices/ReservationSystem.Microservices.User' # path to the User Microservice project directory
  DOTNET_VERSION: '8.0.x' # set this to the dotnet version to use

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: Setup DotNet ${{ env.DOTNET_VERSION }} Environment
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 'Resolve Project Dependencies Using Dotnet'
        shell: bash
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          dotnet build --configuration Release --output ./output
          popd

      - name: 'Run Tests'
        shell: bash
        run: dotnet test src/API/Tests/ReservationSystem.Tests.csproj --configuration Release

      - name: 'Check for Vulnerable Packages'
        shell: bash
        run: |
          dotnet list './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}' package --vulnerable --include-transitive 2>&1 | tee vuln-report.txt
          if grep -qE 'Critical|High' vuln-report.txt; then
            echo "Critical or High severity vulnerabilities found — failing build."
            exit 1
          fi

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6F28EE0873D5439DB07601CFD988165F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E13979EB47684D229041871803738463 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_260FF902C34E40419C1425A2B1CDB317 }}

      - name: 'Run Azure Functions Action'
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: 'reservation-system-db-microservice-user'
          slot-name: 'Production'
          package: '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/output'

