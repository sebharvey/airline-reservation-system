name: Template API - Build

on:
  push:
    branches: [ main ]
    paths:
      - 'src/API/Template/**'
      - 'src/API/ReservationSystem.sln'
      - '.github/workflows/template-api-build.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/API/Template/**'
      - 'src/API/ReservationSystem.sln'
      - '.github/workflows/template-api-build.yml'

jobs:
  build:
    name: Build Template API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/API/Template/ReservationSystem.Template.TemplateApi/ReservationSystem.Template.TemplateApi.csproj

      - name: Build
        run: dotnet build src/API/Template/ReservationSystem.Template.TemplateApi/ReservationSystem.Template.TemplateApi.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish src/API/Template/ReservationSystem.Template.TemplateApi/ReservationSystem.Template.TemplateApi.csproj --configuration Release --no-build --output ./publish/template-api

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: template-api
          path: ./publish/template-api
          retention-days: 7
