name: Loyalty API - Build

on:
  push:
    branches: [ main, master ]
    paths:
      - 'src/API/Orchestration/ReservationSystem.Orchestration.Loyalty/**'
      - 'src/API/ReservationSystem.sln'
      - '.github/workflows/loyalty-api-build.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'src/API/Orchestration/ReservationSystem.Orchestration.Loyalty/**'
      - 'src/API/ReservationSystem.sln'
      - '.github/workflows/loyalty-api-build.yml'

jobs:
  build:
    name: Build Loyalty API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/API/Orchestration/ReservationSystem.Orchestration.Loyalty/ReservationSystem.Orchestration.Loyalty.csproj

      - name: Build
        run: dotnet build src/API/Orchestration/ReservationSystem.Orchestration.Loyalty/ReservationSystem.Orchestration.Loyalty.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish src/API/Orchestration/ReservationSystem.Orchestration.Loyalty/ReservationSystem.Orchestration.Loyalty.csproj --configuration Release --no-build --output ./publish/loyalty-api

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: loyalty-api
          path: ./publish/loyalty-api
          retention-days: 7
