# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions
# Seb Harvey

name: Build and deploy - Exception Microservice

on:
  push:
    branches: [ main ]
    paths:
      - 'src/API/Microservices/ReservationSystem.Microservices.Exceptions/**'
      - 'src/API/Shared/**'
      - 'src/API/ReservationSystem.sln'
      - '.github/workflows/main_reservation-system-microservice-exception.yml'

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'src/API/Microservices/ReservationSystem.Microservices.Exceptions' # path to the Exception Microservice project directory
  DOTNET_VERSION: '8.0.x' # set this to the dotnet version to use

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: Setup DotNet ${{ env.DOTNET_VERSION }} Environment
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 'Resolve Project Dependencies Using Dotnet'
        shell: bash
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          dotnet build --configuration Release
          dotnet test --no-build --configuration Release
          dotnet publish --no-build --configuration Release --output ./output
          popd

      - name: 'Check for vulnerable NuGet packages'
        shell: bash
        run: |
          if dotnet list '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}' package --vulnerable --include-transitive 2>&1 | grep -qEi '(Critical|High)'; then
            echo '::error::Critical or High severity vulnerable NuGet packages detected — update affected packages before deploying'
            exit 1
          fi

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A41C6953B61844BC97D86BAF553A0442 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6F6EA73715824BC5821A6AE17CAF3358 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B1201786ABCF4F12B228973AA2EA5EC0 }}

      - name: 'Run Azure Functions Action'
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: 'reservation-system-microservice-exception'
          slot-name: 'Production'
          package: '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/output'
