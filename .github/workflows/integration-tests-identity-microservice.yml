name: Integration Tests - Identity Microservice

on:
  workflow_dispatch:
    inputs:
      test_project:
        description: 'Test project to run (leave empty for all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - Identity
  push:
    branches: [ main, master ]
    paths:
      - 'src/API/Tests/**'
      - 'src/API/Microservices/ReservationSystem.Microservices.Identity/**'
      - '.github/workflows/integration-tests-identity-microservice.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'src/API/Tests/**'
      - 'src/API/Microservices/ReservationSystem.Microservices.Identity/**'
      - '.github/workflows/integration-tests-identity-microservice.yml'

jobs:
  identity-integration-tests:
    name: Identity Microservice Integration Tests
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.test_project == '' || github.event.inputs.test_project == 'Identity' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/API/Tests/ReservationSystem.Tests.csproj

      - name: Build
        run: dotnet build src/API/Tests/ReservationSystem.Tests.csproj --configuration Release --no-restore

      - name: Run integration tests
        env:
          IDENTITY_API_BASE_URL: ${{ secrets.IDENTITY_API_BASE_URL }}
          IDENTITY_API_HOST_KEY: ${{ secrets.IDENTITY_API_HOST_KEY }}
        run: dotnet test src/API/Tests/ReservationSystem.Tests.csproj --configuration Release --no-build --filter "FullyQualifiedName~ReservationSystem.Tests.IntegrationTests.Identity" --logger "trx;LogFileName=identity-integration-results.trx" --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: identity-integration-test-results
          path: ./TestResults/*.trx
          retention-days: 30
