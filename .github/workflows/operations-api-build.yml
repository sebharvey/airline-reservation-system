name: Operations API - Build

on:
  push:
    branches: [ main, master ]
    paths:
      - 'src/API/Orchestration/ReservationSystem.Orchestration.Operations/**'
      - 'src/API/ReservationSystem.sln'
      - '.github/workflows/operations-api-build.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'src/API/Orchestration/ReservationSystem.Orchestration.Operations/**'
      - 'src/API/ReservationSystem.sln'
      - '.github/workflows/operations-api-build.yml'

jobs:
  build:
    name: Build Operations API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/API/Orchestration/ReservationSystem.Orchestration.Operations/ReservationSystem.Orchestration.Operations.csproj

      - name: Build
        run: dotnet build src/API/Orchestration/ReservationSystem.Orchestration.Operations/ReservationSystem.Orchestration.Operations.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish src/API/Orchestration/ReservationSystem.Orchestration.Operations/ReservationSystem.Orchestration.Operations.csproj --configuration Release --no-build --output ./publish/operations-api

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: operations-api
          path: ./publish/operations-api
          retention-days: 7
