# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy - Operations API

on:
  push:
    branches: [ main ]
    paths:
      - 'src/API/Orchestration/ReservationSystem.Orchestration.Operations/**'
      - '.github/workflows/main_reservation-system-db-api-operations.yml'

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'src/API/Orchestration/ReservationSystem.Orchestration.Operations' # path to the Operations API project directory
  DOTNET_VERSION: '8.0.x' # set this to the dotnet version to use

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: Setup DotNet ${{ env.DOTNET_VERSION }} Environment
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 'Resolve Project Dependencies Using Dotnet'
        shell: bash
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          dotnet build --configuration Release --output ./output
          popd

      - name: 'Run Tests'
        shell: bash
        run: dotnet test src/API/Tests/ReservationSystem.Tests.csproj --configuration Release

      - name: 'Check for Vulnerable Packages'
        shell: bash
        run: |
          dotnet list './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}' package --vulnerable --include-transitive 2>&1 | tee vuln-report.txt
          if grep -qE 'Critical|High' vuln-report.txt; then
            echo "Critical or High severity vulnerabilities found — failing build."
            exit 1
          fi

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8CB344CA7DAF41FCA341336FD58A69CF }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2F1BA2C713E649EBB1C04A2486389CF5 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_EAD332F277E84327A903A57929DEDF96 }}

      - name: 'Run Azure Functions Action'
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: 'reservation-system-db-api-operations'
          slot-name: 'Production'
          package: '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/output'
