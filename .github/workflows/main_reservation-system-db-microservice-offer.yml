# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions


name: Build and deploy - Offer Microservice

on:
  push:
    branches: [ main ]
    paths:
      - 'src/API/Microservices/ReservationSystem.Microservices.Offer/**'
      - 'src/API/Shared/**'
      - '.github/workflows/main_reservation-system-db-microservice-offer.yml'

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'src/API/Microservices/ReservationSystem.Microservices.Offer' # path to the Offer Microservice project directory
  DOTNET_VERSION: '8.0.x' # set this to the dotnet version to use

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: Setup DotNet ${{ env.DOTNET_VERSION }} Environment
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 'Resolve Project Dependencies Using Dotnet'
        shell: bash
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          dotnet build --configuration Release
          dotnet test --no-build --configuration Release
          dotnet publish --no-build --configuration Release --output ./output
          popd

      - name: 'Check for vulnerable NuGet packages'
        shell: bash
        run: |
          if dotnet list '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}' package --vulnerable --include-transitive 2>&1 | grep -qEi '(Critical|High)'; then
            echo '::error::Critical or High severity vulnerable NuGet packages detected — update affected packages before deploying'
            exit 1
          fi

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_25FCF4DFBC9F470DAC621C4300C47D06 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_92CE52E55B074B72AD33F9766EEE07AD }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_312DF97C8C594A4F9AC836ED9563FB8B }}

      - name: 'Run Azure Functions Action'
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: 'reservation-system-db-microservice-offer'
          slot-name: 'Production'
          package: '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/output'

