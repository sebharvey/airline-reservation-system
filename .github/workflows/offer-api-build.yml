name: Offer API - Build

on:
  push:
    branches: [ main, master ]
    paths:
      - 'src/API/Microservices/ReservationSystem.Microservices.Offer/**'
      - 'src/API/ReservationSystem.sln'
      - '.github/workflows/offer-api-build.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'src/API/Microservices/ReservationSystem.Microservices.Offer/**'
      - 'src/API/ReservationSystem.sln'
      - '.github/workflows/offer-api-build.yml'

jobs:
  build:
    name: Build Offer API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/API/Microservices/ReservationSystem.Microservices.Offer/ReservationSystem.Microservices.Offer.csproj

      - name: Build
        run: dotnet build src/API/Microservices/ReservationSystem.Microservices.Offer/ReservationSystem.Microservices.Offer.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish src/API/Microservices/ReservationSystem.Microservices.Offer/ReservationSystem.Microservices.Offer.csproj --configuration Release --no-build --output ./publish/offer-api

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: offer-api
          path: ./publish/offer-api
          retention-days: 7
