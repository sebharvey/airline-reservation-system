<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Air — Payment API Test Harness</title>
    <link rel="stylesheet" href="payment.css">
</head>
<body>

<div class="header">
    <h1>Apex Air — <span>Payment API</span> Test Harness</h1>
</div>

<div class="run-controls">
    <div id="baseUrlList" class="base-url-list"></div>
    <button class="btn-run-all" id="btnRunAll" disabled>▶ Run</button>
</div>

<table class="harness-table">
    <thead>
        <tr>
            <th>Step</th>
            <th>Name</th>
            <th>API Call</th>
            <th>Expected</th>
        </tr>
    </thead>
    <tbody id="journeyBody"></tbody>
</table>

<div id="stepModal" class="modal-overlay" style="display:none">
    <div class="modal">
        <div class="modal-header">
            <div id="modalTitle" class="modal-title"></div>
            <button class="modal-close" id="modalClose">✕</button>
        </div>
        <div id="modalBody" class="modal-body"></div>
    </div>
</div>

<script src="payment.js"></script>
</body>
</html>
