<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apex Air - System Monitor</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --grad-start: #667eea;
      --grad-end: #764ba2;
      --hero-gradient: linear-gradient(135deg, #667eea 0%, #5a3eab 50%, #764ba2 100%);
      --white: #ffffff;
      --bg-light: #f8f9fa;
      --border: #e0e0e0;
      --text: #333333;
      --text-muted: #666666;
      --input-bg: #ffffff;
      --radius-sm: 12px;
      --radius-md: 18px;
      --shadow-card: 0 20px 60px rgba(0, 0, 0, 0.3);
      --transition: 0.25s ease;
      --sidebar-bg: #ffffff;
      --card-bg: #ffffff;
      --success: #22c55e;
      --error: #ef4444;
      --warning: #f59e0b;
      --pending: #9494b0;
    }

    html.dark {
      --hero-gradient: linear-gradient(135deg, #1a1f4a 0%, #2b1e5a 50%, #2d1b4e 100%);
      --white: #1e1e2e;
      --bg-light: #27273a;
      --border: #3a3a50;
      --text: #e2e2f0;
      --text-muted: #9494b0;
      --input-bg: #2a2a3e;
      --shadow-card: 0 20px 60px rgba(0, 0, 0, 0.6);
      --sidebar-bg: #1e1e2e;
      --card-bg: #2a2a3e;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 15px;
      color: var(--text);
      background: var(--bg-light);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    html.dark body {
      background: #171724;
    }

    /* ── Header ── */
    .header {
      background: var(--hero-gradient);
      color: #fff;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .header-left span.logo {
      font-size: 22px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .summary-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.18);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    .summary-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .theme-toggle {
      background: rgba(255,255,255,0.18);
      border: none;
      color: #fff;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .theme-toggle:hover {
      background: rgba(255,255,255,0.3);
    }

    .secret-btn {
      background: rgba(255,255,255,0.18);
      border: none;
      color: #fff;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
    }

    .secret-btn:hover {
      background: rgba(255,255,255,0.3);
    }

    .secret-btn.has-secret {
      background: rgba(34,197,94,0.3);
    }

    .secret-btn.has-secret:hover {
      background: rgba(34,197,94,0.45);
    }

    /* ── Secret Modal ── */
    .secret-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: overlayFadeIn 0.18s ease;
    }

    @keyframes overlayFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .secret-modal {
      background: var(--white);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-card);
      width: 90%;
      max-width: 420px;
      animation: modalSlideIn 0.22s ease;
      overflow: hidden;
    }

    @keyframes modalSlideIn {
      from { opacity: 0; transform: translateY(16px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .secret-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
    }

    .secret-modal-header h2 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .secret-modal-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }

    .secret-modal-close:hover {
      background: var(--bg-light);
      color: var(--text);
    }

    .secret-modal-body {
      padding: 20px 24px;
    }

    .secret-modal-body p {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .secret-field-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      display: block;
      margin-bottom: 6px;
    }

    .secret-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .secret-input:focus {
      border-color: var(--grad-start);
    }

    .secret-stored-info {
      margin-top: 12px;
      padding: 8px 12px;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      border-radius: 6px;
      font-size: 12px;
      color: var(--success);
      display: none;
    }

    .secret-stored-info.visible {
      display: block;
    }

    .secret-modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
    }

    .secret-cancel-btn {
      padding: 8px 18px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: none;
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .secret-cancel-btn:hover {
      background: var(--bg-light);
    }

    .secret-save-btn {
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .secret-save-btn:hover {
      opacity: 0.88;
    }

    .secret-save-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .refresh-btn {
      background: rgba(255,255,255,0.18);
      border: none;
      color: #fff;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
    }

    .refresh-btn:hover {
      background: rgba(255,255,255,0.3);
    }

    .refresh-btn.spinning svg {
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      height: calc(100vh - 56px);
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 300px;
      min-width: 300px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }

    .sidebar-group-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-muted);
      padding: 18px 16px 6px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.15s, border-color 0.15s;
      font-size: 14px;
    }

    .sidebar-item:hover {
      background: var(--bg-light);
    }

    .sidebar-item.active {
      background: var(--bg-light);
      border-left-color: var(--grad-start);
      font-weight: 600;
    }

    .sidebar-item .status-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sidebar-item .service-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-item .response-time {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ── Status icons ── */
    .icon-healthy {
      color: var(--success);
    }

    .icon-unhealthy {
      color: var(--error);
    }

    .icon-pending {
      color: var(--pending);
    }

    .icon-checking {
      color: var(--text-muted);
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* ── Main content ── */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .detail-card {
      background: var(--card-bg);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      width: 100%;
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }

    .operations-card {
      background: var(--card-bg);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      width: 100%;
      margin-top: 16px;
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }

    .operations-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .operations-title {
      font-size: 15px;
      font-weight: 700;
    }

    .operations-count {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--bg-light);
      border: 1px solid var(--border);
      padding: 1px 8px;
      border-radius: 10px;
    }

    .operations-empty {
      padding: 32px 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    .accordion-item {
      border-bottom: 1px solid var(--border);
    }

    .accordion-item:last-child {
      border-bottom: none;
    }

    .accordion-trigger {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    .accordion-trigger:hover {
      background: var(--bg-light);
    }

    .method-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      min-width: 54px;
      text-align: center;
      flex-shrink: 0;
      letter-spacing: 0.3px;
    }

    .method-GET    { background: rgba(34,197,94,0.12);  color: #16a34a; }
    .method-POST   { background: rgba(59,130,246,0.12); color: #2563eb; }
    .method-PUT    { background: rgba(245,158,11,0.12); color: #d97706; }
    .method-PATCH  { background: rgba(168,85,247,0.12); color: #9333ea; }
    .method-DELETE { background: rgba(239,68,68,0.12);  color: #dc2626; }

    html.dark .method-GET    { background: rgba(34,197,94,0.18);  color: #4ade80; }
    html.dark .method-POST   { background: rgba(59,130,246,0.18); color: #60a5fa; }
    html.dark .method-PUT    { background: rgba(245,158,11,0.18); color: #fbbf24; }
    html.dark .method-PATCH  { background: rgba(168,85,247,0.18); color: #c084fc; }
    html.dark .method-DELETE { background: rgba(239,68,68,0.18);  color: #f87171; }

    .accordion-path {
      flex: 1;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .accordion-name {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .accordion-chevron {
      flex-shrink: 0;
      color: var(--text-muted);
      transition: transform 0.2s;
    }

    .accordion-item.open .accordion-chevron {
      transform: rotate(180deg);
    }

    .accordion-body {
      display: none;
      padding: 0 24px 16px;
      background: var(--bg-light);
      border-top: 1px solid var(--border);
    }

    .accordion-item.open .accordion-body {
      display: block;
    }

    .path-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 0 10px;
    }

    .path-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .path-input {
      flex: 1;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 13px;
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--input-bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .path-input:focus {
      border-color: var(--grad-start);
    }

    .body-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .body-textarea {
      width: 100%;
      min-height: 100px;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 12px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--input-bg);
      color: var(--text);
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 12px;
    }

    .body-textarea:focus {
      border-color: var(--grad-start);
    }

    .response-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .response-box {
      width: 100%;
      min-height: 80px;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 12px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card-bg);
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* ── Invoke button ── */
    .invoke-row {
      display: flex;
      justify-content: flex-end;
      padding: 8px 0 12px;
    }

    .invoke-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    .invoke-btn:hover:not(:disabled) {
      opacity: 0.88;
    }

    .invoke-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .invoke-btn svg {
      flex-shrink: 0;
    }

    /* ── Response header row (label + status badge) ── */
    .response-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .response-row .response-label {
      margin-bottom: 0;
    }

    /* ── Status code badge ── */
    .status-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      letter-spacing: 0.3px;
      display: none;
    }

    .status-badge:not(:empty) {
      display: inline-block;
    }

    .status-2xx { background: rgba(34,197,94,0.15);  color: #16a34a; }
    .status-3xx { background: rgba(59,130,246,0.15); color: #2563eb; }
    .status-4xx { background: rgba(245,158,11,0.15); color: #d97706; }
    .status-5xx { background: rgba(239,68,68,0.15);  color: #dc2626; }
    .status-err { background: rgba(239,68,68,0.15);  color: #dc2626; }

    html.dark .status-2xx { background: rgba(34,197,94,0.2);  color: #4ade80; }
    html.dark .status-3xx { background: rgba(59,130,246,0.2); color: #60a5fa; }
    html.dark .status-4xx { background: rgba(245,158,11,0.2); color: #fbbf24; }
    html.dark .status-5xx { background: rgba(239,68,68,0.2);  color: #f87171; }
    html.dark .status-err { background: rgba(239,68,68,0.2);  color: #f87171; }

    .detail-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    .detail-header .status-icon-lg {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .status-icon-lg.healthy {
      background: rgba(34, 197, 94, 0.12);
      color: var(--success);
    }

    .status-icon-lg.unhealthy {
      background: rgba(239, 68, 68, 0.12);
      color: var(--error);
    }

    .status-icon-lg.pending {
      background: rgba(148, 148, 176, 0.12);
      color: var(--pending);
    }

    .status-icon-lg.checking {
      background: rgba(148, 148, 176, 0.12);
      color: var(--text-muted);
    }

    .detail-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .detail-status-label {
      font-size: 13px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 10px;
      display: inline-block;
    }

    .label-healthy {
      background: rgba(34, 197, 94, 0.12);
      color: var(--success);
    }

    .label-unhealthy {
      background: rgba(239, 68, 68, 0.12);
      color: var(--error);
    }

    .label-pending {
      background: rgba(148, 148, 176, 0.12);
      color: var(--pending);
    }

    .label-checking {
      background: rgba(148, 148, 176, 0.12);
      color: var(--text-muted);
    }

    .detail-body {
      padding: 24px;
    }

    .detail-description {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .detail-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .detail-field.full-width {
      grid-column: 1 / -1;
    }

    .field-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
    }

    .field-value {
      font-size: 14px;
      word-break: break-all;
    }

    .field-value a {
      color: var(--grad-start);
      text-decoration: none;
    }

    .field-value a:hover {
      text-decoration: underline;
    }

    .btn-link {
      display: inline-block;
      padding: 4px 12px;
      border: 1px solid var(--grad-start);
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--grad-start) !important;
      text-decoration: none !important;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .btn-link:hover {
      background: var(--grad-start);
      color: #fff !important;
      text-decoration: none !important;
    }

    .caller-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .caller-tag {
      background: var(--bg-light);
      color: var(--text-muted);
      padding: 3px 10px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border);
    }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      text-align: center;
      gap: 12px;
    }

    .empty-state svg {
      opacity: 0.3;
    }

    /* ── Last checked ── */
    .last-checked {
      font-size: 11px;
      color: var(--text-muted);
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      text-align: center;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .sidebar {
        width: 64px;
        min-width: 64px;
      }

      .sidebar-group-title,
      .sidebar-item .service-name,
      .sidebar-item .response-time {
        display: none;
      }

      .sidebar-item {
        justify-content: center;
        padding: 12px;
        border-left: none;
        border-bottom: 2px solid transparent;
      }

      .sidebar-item.active {
        border-bottom-color: var(--grad-start);
        border-left-color: transparent;
      }

      .detail-grid {
        grid-template-columns: 1fr;
      }

      .summary-badge span {
        display: none;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="logo">&#9992;</span>
      Apex Air <span style="font-weight:400;opacity:0.8;font-size:14px;">System Monitor</span>
    </div>
    <div class="header-right">
      <div class="summary-badge" id="summaryHealthy">
        <div class="summary-dot" style="background:var(--success)"></div>
        <span id="healthyCount">0</span> <span>Healthy</span>
      </div>
      <div class="summary-badge" id="summaryUnhealthy">
        <div class="summary-dot" style="background:var(--error)"></div>
        <span id="unhealthyCount">0</span> <span>Unhealthy</span>
      </div>
      <button class="secret-btn" id="secretBtn" onclick="openSecretModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        <span id="secretBtnLabel">Add Secret</span>
      </button>
      <button class="refresh-btn" id="refreshBtn" onclick="runHealthChecks()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
        Refresh
      </button>
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">&#127769;</button>
    </div>
  </div>

  <div class="layout">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar"></div>

    <!-- Main -->
    <div class="main" id="main"></div>
  </div>

  <!-- Secret Modal -->
  <div class="secret-overlay" id="secretOverlay" style="display:none" onclick="onOverlayClick(event)">
    <div class="secret-modal" onclick="event.stopPropagation()">
      <div class="secret-modal-header">
        <h2>&#128274; Host Key Secret</h2>
        <button class="secret-modal-close" onclick="closeSecretModal()" aria-label="Close">&times;</button>
      </div>
      <div class="secret-modal-body">
        <p>Enter a secret password to use as the Host Key for authenticating non-anonymous microservice endpoints. The value will be base64-encoded and stored in local storage.</p>
        <label class="secret-field-label" for="secretInput">Secret</label>
        <input class="secret-input" id="secretInput" type="password" placeholder="Enter secret..." autocomplete="new-password" oninput="onSecretInput()" onkeydown="onSecretKeyDown(event)" />
        <div class="secret-stored-info" id="secretStoredInfo">&#10003; A secret is currently stored. Saving will replace it.</div>
      </div>
      <div class="secret-modal-footer">
        <button class="secret-cancel-btn" onclick="closeSecretModal()">Cancel</button>
        <button class="secret-save-btn" id="secretSaveBtn" onclick="saveSecret()" disabled>Save</button>
      </div>
    </div>
  </div>

  <script>
    let servicesData = null;
    let healthResults = {};
    let selectedId = 'retail-api';

    // ── Secret Modal ──
    function openSecretModal() {
      document.getElementById('secretInput').value = '';
      document.getElementById('secretSaveBtn').disabled = true;
      const hasSecret = !!localStorage.getItem('hostKey');
      const info = document.getElementById('secretStoredInfo');
      info.classList.toggle('visible', hasSecret);
      const overlay = document.getElementById('secretOverlay');
      overlay.style.display = 'flex';
      setTimeout(() => document.getElementById('secretInput').focus(), 50);
    }

    function closeSecretModal() {
      document.getElementById('secretOverlay').style.display = 'none';
    }

    function onOverlayClick(event) {
      if (event.target === document.getElementById('secretOverlay')) {
        closeSecretModal();
      }
    }

    function onSecretInput() {
      const val = document.getElementById('secretInput').value;
      document.getElementById('secretSaveBtn').disabled = val.trim().length === 0;
    }

    function onSecretKeyDown(event) {
      if (event.key === 'Enter') saveSecret();
      if (event.key === 'Escape') closeSecretModal();
    }

    function saveSecret() {
      const val = document.getElementById('secretInput').value.trim();
      if (!val) return;
      const encoded = btoa(val);
      localStorage.setItem('hostKey', encoded);
      closeSecretModal();
      updateSecretBtn();
    }

    function updateSecretBtn() {
      const hasSecret = !!localStorage.getItem('hostKey');
      const btn = document.getElementById('secretBtn');
      const label = document.getElementById('secretBtnLabel');
      btn.classList.toggle('has-secret', hasSecret);
      label.textContent = hasSecret ? 'Secret Set' : 'Add Secret';
    }

    // ── Theme ──
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      document.getElementById('themeToggle').textContent = isDark ? '\u2600\uFE0F' : '\uD83C\uDF19';
    }

    (function initTheme() {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark') {
        document.documentElement.classList.add('dark');
        document.getElementById('themeToggle').textContent = '\u2600\uFE0F';
      }
    })();

    updateSecretBtn();

    // ── SVG icons ──
    function tickIcon(cls) {
      return `<svg class="${cls}" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`;
    }

    function crossIcon(cls) {
      return `<svg class="${cls}" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`;
    }

    function pendingIcon(cls) {
      return `<svg class="${cls}" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
    }

    function getStatusIcon(id, size) {
      const r = healthResults[id];
      if (!r) return pendingIcon(size === 'lg' ? 'icon-pending' : 'icon-pending');
      if (r.status === 'checking') return pendingIcon('icon-checking');
      if (r.status === 'healthy') return tickIcon('icon-healthy');
      return crossIcon('icon-unhealthy');
    }

    function getStatusClass(id) {
      const r = healthResults[id];
      if (!r) return 'pending';
      return r.status;
    }

    function getStatusLabel(id) {
      const r = healthResults[id];
      if (!r) return 'Pending';
      if (r.status === 'checking') return 'Checking...';
      if (r.status === 'healthy') return 'Healthy';
      return 'Unhealthy';
    }

    // ── Load services.json ──
    async function loadServices() {
      try {
        const resp = await fetch('services.json');
        servicesData = await resp.json();
        renderSidebar();
        renderMain();
        runHealthChecks();
      } catch (e) {
        document.getElementById('main').innerHTML = `<div class="empty-state"><p>Failed to load services.json</p><p style="font-size:12px">${e.message}</p></div>`;
      }
    }

    // ── Get all services as flat list ──
    function allServices() {
      if (!servicesData) return [];
      return [
        ...servicesData.orchestrationApis.map(s => ({ ...s, group: 'orchestration' })),
        ...servicesData.microservices.map(s => ({ ...s, group: 'microservice' })),
        ...(servicesData.other || []).map(s => ({ ...s, group: 'other' }))
      ];
    }

    function findService(id) {
      return allServices().find(s => s.id === id);
    }

    // ── Render sidebar ──
    function renderSidebar() {
      const el = document.getElementById('sidebar');
      let html = '';

      html += `<div class="sidebar-group-title">Orchestration APIs</div>`;
      for (const s of servicesData.orchestrationApis) {
        html += sidebarItem(s);
      }

      html += `<div class="sidebar-group-title">Microservices</div>`;
      for (const s of servicesData.microservices) {
        html += sidebarItem(s);
      }

      if (servicesData.other && servicesData.other.length > 0) {
        html += `<div class="sidebar-group-title">Other</div>`;
        for (const s of servicesData.other) {
          html += sidebarItem(s);
        }
      }

      el.innerHTML = html;
    }

    function sidebarItem(s) {
      const active = selectedId === s.id ? ' active' : '';
      const r = healthResults[s.id];
      const time = r && r.responseTime ? `${r.responseTime}ms` : '';
      return `<div class="sidebar-item${active}" onclick="selectService('${s.id}')" title="${s.name}">
        <div class="status-icon">${getStatusIcon(s.id)}</div>
        <span class="service-name">${s.name}</span>
        <span class="response-time">${time}</span>
      </div>`;
    }

    // ── Render main ──
    function renderMain() {
      if (selectedId) {
        renderDetail(selectedId);
      }
    }

    function renderDetail(id) {
      const s = findService(id);
      if (!s) return;
      const el = document.getElementById('main');
      const cls = getStatusClass(s.id);
      const r = healthResults[s.id];
      const time = r && r.responseTime ? `${r.responseTime}ms` : '-';
      const checkedAt = r && r.checkedAt ? new Date(r.checkedAt).toLocaleTimeString() : '-';
      const errorMsg = r && r.error ? `<div class="detail-field full-width"><span class="field-label">Error</span><span class="field-value" style="color:var(--error)">${r.error}</span></div>` : '';

      el.innerHTML = `
        <div class="detail-card">
          <div class="detail-header">
            <div class="status-icon-lg ${cls}">${getStatusIcon(s.id, 'lg')}</div>
            <div>
              <div class="detail-title">${s.name}</div>
              <span class="detail-status-label label-${cls}">${getStatusLabel(s.id)}</span>
            </div>
          </div>
          <div class="detail-body">
            <p class="detail-description">${s.description}</p>
            <div class="detail-grid">
              <div class="detail-field full-width">
                <span class="field-label">Base URL</span>
                <span class="field-value"><a href="${s.baseUrl}" target="_blank" rel="noopener">${s.baseUrl}</a></span>
              </div>
              <div class="detail-field">
                <span class="field-label">Health Endpoint</span>
                <span class="field-value"><a href="${s.baseUrl}${s.healthEndpoint}" target="_blank" rel="noopener">${s.healthEndpoint}</a></span>
              </div>
              <div class="detail-field">
                <span class="field-label">Swagger</span>
                <span class="field-value">
                  <a class="btn-link" href="${s.baseUrl}${s.swaggerEndpoint}" target="_blank" rel="noopener">View JSON</a>
                  <a class="btn-link" href="https://editor.swagger.io/?url=${encodeURIComponent(s.baseUrl + s.swaggerEndpoint)}" target="_blank" rel="noopener">Open in Swagger Editor</a>
                </span>
              </div>
              <div class="detail-field">
                <span class="field-label">Auth Type</span>
                <span class="field-value">${s.authType}</span>
              </div>
              <div class="detail-field">
                <span class="field-label">Response Time</span>
                <span class="field-value">${time}</span>
              </div>
              <div class="detail-field">
                <span class="field-label">Last Checked</span>
                <span class="field-value">${checkedAt}</span>
              </div>
              <div class="detail-field">
                <span class="field-label">Group</span>
                <span class="field-value">${s.group === 'orchestration' ? 'Orchestration API' : s.group === 'microservice' ? 'Microservice' : 'Other'}</span>
              </div>
              ${errorMsg}
              <div class="detail-field full-width">
                <span class="field-label">Callers</span>
                <div class="caller-tags">
                  ${s.callers.map(c => `<span class="caller-tag">${c}</span>`).join('')}
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="operations-card">
          <div class="operations-header">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            <span class="operations-title">Operations</span>
            <span class="operations-count">${(s.operations || []).length}</span>
          </div>
          ${renderOperations(s)}
        </div>`;
    }

    // ── Operations accordion ──
    function renderOperations(s) {
      const ops = s.operations || [];
      if (ops.length === 0) {
        return `<div class="operations-empty">No operations defined for this service.</div>`;
      }
      return ops.map((op, i) => {
        const isGet = op.method === 'GET' || op.method === 'DELETE';
        const bodySection = isGet ? '' : `
          <div class="body-label">Request Body</div>
          <textarea class="body-textarea" placeholder='{\n  \n}'></textarea>`;
        const playIcon = `<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
        const spinIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 0.8s linear infinite"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>`;
        return `<div class="accordion-item" id="acc-${s.id}-${i}">
          <div class="accordion-trigger" onclick="toggleAccordion('${s.id}', ${i})">
            <span class="method-badge method-${op.method}">${op.method}</span>
            <span class="accordion-path">${op.path}</span>
            <span class="accordion-name">${op.name}</span>
            <svg class="accordion-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div class="accordion-body">
            <div class="path-row">
              <span class="path-label">URL Path</span>
              <input class="path-input" type="text" value="${op.path}" spellcheck="false" />
            </div>
            ${bodySection}
            <div class="invoke-row">
              <button class="invoke-btn" id="invoke-btn-${s.id}-${i}" onclick="invokeOperation('${s.id}', ${i})">${playIcon} Invoke</button>
            </div>
            <div class="response-row">
              <span class="response-label">Response</span>
              <span class="status-badge" id="status-badge-${s.id}-${i}"></span>
            </div>
            <div class="response-box" id="response-box-${s.id}-${i}">— no response yet —</div>
          </div>
        </div>`;
      }).join('');
    }

    function toggleAccordion(serviceId, index) {
      const item = document.getElementById(`acc-${serviceId}-${index}`);
      if (item) item.classList.toggle('open');
    }

    // ── Invoke operation ──
    async function invokeOperation(serviceId, index) {
      const service = findService(serviceId);
      if (!service) return;

      const item = document.getElementById(`acc-${serviceId}-${index}`);
      const pathInput = item.querySelector('.path-input');
      const bodyTextarea = item.querySelector('.body-textarea');
      const responseBox = document.getElementById(`response-box-${serviceId}-${index}`);
      const statusBadge = document.getElementById(`status-badge-${serviceId}-${index}`);
      const invokeBtn = document.getElementById(`invoke-btn-${serviceId}-${index}`);

      const spinIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 0.8s linear infinite"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>`;
      const playIcon = `<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;

      // Lock button
      invokeBtn.disabled = true;
      invokeBtn.innerHTML = `${spinIcon} Invoking…`;
      statusBadge.textContent = '';
      statusBadge.className = 'status-badge';
      responseBox.style.color = 'var(--text-muted)';
      responseBox.textContent = 'Loading…';

      const path = pathInput ? pathInput.value : service.operations[index].path;
      const url = service.baseUrl + path;
      const method = service.operations[index].method;

      const headers = {};
      if (method !== 'GET' && method !== 'DELETE') {
        headers['Content-Type'] = 'application/json';
      }
      if (service.authType === 'host-key') {
        const encoded = localStorage.getItem('hostKey');
        if (encoded) headers['x-functions-key'] = atob(encoded);
      } else if (service.authType === 'bearer') {
        const encoded = localStorage.getItem('hostKey');
        if (encoded) headers['Authorization'] = `Bearer ${atob(encoded)}`;
      }

      try {
        const fetchOptions = { method, headers, mode: 'cors', signal: AbortSignal.timeout(30000) };
        if (bodyTextarea && bodyTextarea.value.trim()) {
          fetchOptions.body = bodyTextarea.value;
        }

        const resp = await fetch(url, fetchOptions);
        const statusCode = resp.status;

        let statusClass = 'status-5xx';
        if (statusCode >= 200 && statusCode < 300) statusClass = 'status-2xx';
        else if (statusCode >= 300 && statusCode < 400) statusClass = 'status-3xx';
        else if (statusCode >= 400 && statusCode < 500) statusClass = 'status-4xx';

        statusBadge.textContent = `${statusCode} ${resp.statusText || ''}`.trim();
        statusBadge.className = `status-badge ${statusClass}`;

        const contentType = resp.headers.get('content-type') || '';
        let bodyText;
        if (contentType.includes('application/json')) {
          const json = await resp.json();
          bodyText = JSON.stringify(json, null, 2);
        } else {
          bodyText = await resp.text();
        }

        responseBox.style.color = 'var(--text)';
        responseBox.textContent = bodyText || '(empty response)';
      } catch (e) {
        statusBadge.textContent = 'ERROR';
        statusBadge.className = 'status-badge status-err';
        responseBox.style.color = 'var(--error)';
        responseBox.textContent = e.name === 'TimeoutError' ? 'Request timed out (30s)' : (e.message || 'Request failed');
      } finally {
        invokeBtn.disabled = false;
        invokeBtn.innerHTML = `${playIcon} Invoke`;
      }
    }

    // ── Selection ──
    function selectService(id) {
      selectedId = id;
      renderSidebar();
      renderMain();
    }

    // ── Health checks ──
    async function runHealthChecks() {
      const btn = document.getElementById('refreshBtn');
      btn.classList.add('spinning');

      const services = allServices();

      // Run checks concurrently; keep showing last-known state while checks are in-flight
      const promises = services.map(s => checkHealth(s));
      await Promise.allSettled(promises);

      btn.classList.remove('spinning');
    }

    async function checkHealth(service) {
      const url = service.baseUrl + service.healthEndpoint;
      const start = performance.now();
      try {
        const resp = await fetch(url, {
          method: 'GET',
          mode: 'cors',
          signal: AbortSignal.timeout(10000)
        });
        const elapsed = Math.round(performance.now() - start);
        if (resp.ok) {
          healthResults[service.id] = { status: 'healthy', responseTime: elapsed, checkedAt: Date.now() };
        } else {
          healthResults[service.id] = { status: 'unhealthy', responseTime: elapsed, checkedAt: Date.now(), error: `HTTP ${resp.status}` };
        }
      } catch (e) {
        const elapsed = Math.round(performance.now() - start);
        healthResults[service.id] = { status: 'unhealthy', responseTime: elapsed, checkedAt: Date.now(), error: e.message || 'Network error' };
      }
      // Live update sidebar and main as each check completes
      updateCounts();
      renderSidebar();
      renderMain();
    }

    function updateCounts() {
      const all = allServices();
      let healthy = 0, unhealthy = 0;
      for (const s of all) {
        const r = healthResults[s.id];
        if (r && r.status === 'healthy') healthy++;
        else if (r && r.status === 'unhealthy') unhealthy++;
      }
      document.getElementById('healthyCount').textContent = healthy;
      document.getElementById('unhealthyCount').textContent = unhealthy;
    }

    // ── Init ──
    loadServices();
    setInterval(runHealthChecks, 60000);
  </script>
</body>
</html>
