<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apex Air - Health Monitoring Dashboard</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --grad-start: #667eea;
      --grad-end: #764ba2;
      --hero-gradient: linear-gradient(135deg, #667eea 0%, #5a3eab 50%, #764ba2 100%);
      --white: #ffffff;
      --bg-light: #f8f9fa;
      --border: #e0e0e0;
      --text: #333333;
      --text-muted: #666666;
      --input-bg: #ffffff;
      --radius-sm: 12px;
      --radius-md: 18px;
      --shadow-card: 0 20px 60px rgba(0, 0, 0, 0.3);
      --transition: 0.25s ease;
      --sidebar-bg: #ffffff;
      --card-bg: #ffffff;
      --success: #22c55e;
      --error: #ef4444;
      --warning: #f59e0b;
      --pending: #9494b0;
    }

    html.dark {
      --hero-gradient: linear-gradient(135deg, #1a1f4a 0%, #2b1e5a 50%, #2d1b4e 100%);
      --white: #1e1e2e;
      --bg-light: #27273a;
      --border: #3a3a50;
      --text: #e2e2f0;
      --text-muted: #9494b0;
      --input-bg: #2a2a3e;
      --shadow-card: 0 20px 60px rgba(0, 0, 0, 0.6);
      --sidebar-bg: #1e1e2e;
      --card-bg: #2a2a3e;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 15px;
      color: var(--text);
      background: var(--bg-light);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    html.dark body {
      background: #171724;
    }

    /* ── Header ── */
    .header {
      background: var(--hero-gradient);
      color: #fff;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .header-left span.logo {
      font-size: 22px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .summary-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.18);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    .summary-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .theme-toggle {
      background: rgba(255,255,255,0.18);
      border: none;
      color: #fff;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .theme-toggle:hover {
      background: rgba(255,255,255,0.3);
    }

    .refresh-btn {
      background: rgba(255,255,255,0.18);
      border: none;
      color: #fff;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
    }

    .refresh-btn:hover {
      background: rgba(255,255,255,0.3);
    }

    .refresh-btn.spinning svg {
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      height: calc(100vh - 56px);
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 300px;
      min-width: 300px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }

    .sidebar-group-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-muted);
      padding: 18px 16px 6px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.15s, border-color 0.15s;
      font-size: 14px;
    }

    .sidebar-item:hover {
      background: var(--bg-light);
    }

    .sidebar-item.active {
      background: var(--bg-light);
      border-left-color: var(--grad-start);
      font-weight: 600;
    }

    .sidebar-item .status-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sidebar-item .service-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-item .response-time {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ── Status icons ── */
    .icon-healthy {
      color: var(--success);
    }

    .icon-unhealthy {
      color: var(--error);
    }

    .icon-pending {
      color: var(--pending);
    }

    .icon-checking {
      color: var(--text-muted);
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* ── Main content ── */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .detail-card {
      background: var(--card-bg);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      width: 100%;
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }

    .resources-card {
      background: var(--card-bg);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      width: 100%;
      margin-top: 16px;
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }

    .resources-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .resources-title {
      font-size: 15px;
      font-weight: 700;
    }

    .resources-body {
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-muted);
      text-align: center;
    }

    .resources-body svg {
      opacity: 0.25;
    }

    .resources-placeholder-text {
      font-size: 13px;
    }

    .detail-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    .detail-header .status-icon-lg {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .status-icon-lg.healthy {
      background: rgba(34, 197, 94, 0.12);
      color: var(--success);
    }

    .status-icon-lg.unhealthy {
      background: rgba(239, 68, 68, 0.12);
      color: var(--error);
    }

    .status-icon-lg.pending {
      background: rgba(148, 148, 176, 0.12);
      color: var(--pending);
    }

    .status-icon-lg.checking {
      background: rgba(148, 148, 176, 0.12);
      color: var(--text-muted);
    }

    .detail-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .detail-status-label {
      font-size: 13px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 10px;
      display: inline-block;
    }

    .label-healthy {
      background: rgba(34, 197, 94, 0.12);
      color: var(--success);
    }

    .label-unhealthy {
      background: rgba(239, 68, 68, 0.12);
      color: var(--error);
    }

    .label-pending {
      background: rgba(148, 148, 176, 0.12);
      color: var(--pending);
    }

    .label-checking {
      background: rgba(148, 148, 176, 0.12);
      color: var(--text-muted);
    }

    .detail-body {
      padding: 24px;
    }

    .detail-description {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .detail-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .detail-field.full-width {
      grid-column: 1 / -1;
    }

    .field-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
    }

    .field-value {
      font-size: 14px;
      word-break: break-all;
    }

    .field-value a {
      color: var(--grad-start);
      text-decoration: none;
    }

    .field-value a:hover {
      text-decoration: underline;
    }

    .caller-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .caller-tag {
      background: var(--bg-light);
      color: var(--text-muted);
      padding: 3px 10px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border);
    }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      text-align: center;
      gap: 12px;
    }

    .empty-state svg {
      opacity: 0.3;
    }

    /* ── Last checked ── */
    .last-checked {
      font-size: 11px;
      color: var(--text-muted);
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      text-align: center;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .sidebar {
        width: 64px;
        min-width: 64px;
      }

      .sidebar-group-title,
      .sidebar-item .service-name,
      .sidebar-item .response-time {
        display: none;
      }

      .sidebar-item {
        justify-content: center;
        padding: 12px;
        border-left: none;
        border-bottom: 2px solid transparent;
      }

      .sidebar-item.active {
        border-bottom-color: var(--grad-start);
        border-left-color: transparent;
      }

      .detail-grid {
        grid-template-columns: 1fr;
      }

      .summary-badge span {
        display: none;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="logo">&#9992;</span>
      Apex Air <span style="font-weight:400;opacity:0.8;font-size:14px;">Health Monitor</span>
    </div>
    <div class="header-right">
      <div class="summary-badge" id="summaryHealthy">
        <div class="summary-dot" style="background:var(--success)"></div>
        <span id="healthyCount">0</span> <span>Healthy</span>
      </div>
      <div class="summary-badge" id="summaryUnhealthy">
        <div class="summary-dot" style="background:var(--error)"></div>
        <span id="unhealthyCount">0</span> <span>Unhealthy</span>
      </div>
      <button class="refresh-btn" id="refreshBtn" onclick="runHealthChecks()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
        Refresh
      </button>
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">&#127769;</button>
    </div>
  </div>

  <div class="layout">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar"></div>

    <!-- Main -->
    <div class="main" id="main"></div>
  </div>

  <script>
    let servicesData = null;
    let healthResults = {};
    let selectedId = 'retail-api';

    // ── Theme ──
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      document.getElementById('themeToggle').textContent = isDark ? '\u2600\uFE0F' : '\uD83C\uDF19';
    }

    (function initTheme() {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark') {
        document.documentElement.classList.add('dark');
        document.getElementById('themeToggle').textContent = '\u2600\uFE0F';
      }
    })();

    // ── SVG icons ──
    function tickIcon(cls) {
      return `<svg class="${cls}" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`;
    }

    function crossIcon(cls) {
      return `<svg class="${cls}" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`;
    }

    function pendingIcon(cls) {
      return `<svg class="${cls}" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
    }

    function getStatusIcon(id, size) {
      const r = healthResults[id];
      if (!r) return pendingIcon(size === 'lg' ? 'icon-pending' : 'icon-pending');
      if (r.status === 'checking') return pendingIcon('icon-checking');
      if (r.status === 'healthy') return tickIcon('icon-healthy');
      return crossIcon('icon-unhealthy');
    }

    function getStatusClass(id) {
      const r = healthResults[id];
      if (!r) return 'pending';
      return r.status;
    }

    function getStatusLabel(id) {
      const r = healthResults[id];
      if (!r) return 'Pending';
      if (r.status === 'checking') return 'Checking...';
      if (r.status === 'healthy') return 'Healthy';
      return 'Unhealthy';
    }

    // ── Load services.json ──
    async function loadServices() {
      try {
        const resp = await fetch('services.json');
        servicesData = await resp.json();
        renderSidebar();
        renderMain();
        runHealthChecks();
      } catch (e) {
        document.getElementById('main').innerHTML = `<div class="empty-state"><p>Failed to load services.json</p><p style="font-size:12px">${e.message}</p></div>`;
      }
    }

    // ── Get all services as flat list ──
    function allServices() {
      if (!servicesData) return [];
      return [
        ...servicesData.orchestrationApis.map(s => ({ ...s, group: 'orchestration' })),
        ...servicesData.microservices.map(s => ({ ...s, group: 'microservice' })),
        ...(servicesData.other || []).map(s => ({ ...s, group: 'other' }))
      ];
    }

    function findService(id) {
      return allServices().find(s => s.id === id);
    }

    // ── Render sidebar ──
    function renderSidebar() {
      const el = document.getElementById('sidebar');
      let html = '';

      html += `<div class="sidebar-group-title">Orchestration APIs</div>`;
      for (const s of servicesData.orchestrationApis) {
        html += sidebarItem(s);
      }

      html += `<div class="sidebar-group-title">Microservices</div>`;
      for (const s of servicesData.microservices) {
        html += sidebarItem(s);
      }

      if (servicesData.other && servicesData.other.length > 0) {
        html += `<div class="sidebar-group-title">Other</div>`;
        for (const s of servicesData.other) {
          html += sidebarItem(s);
        }
      }

      el.innerHTML = html;
    }

    function sidebarItem(s) {
      const active = selectedId === s.id ? ' active' : '';
      const r = healthResults[s.id];
      const time = r && r.responseTime ? `${r.responseTime}ms` : '';
      return `<div class="sidebar-item${active}" onclick="selectService('${s.id}')" title="${s.name}">
        <div class="status-icon">${getStatusIcon(s.id)}</div>
        <span class="service-name">${s.name}</span>
        <span class="response-time">${time}</span>
      </div>`;
    }

    // ── Render main ──
    function renderMain() {
      if (selectedId) {
        renderDetail(selectedId);
      }
    }

    function renderDetail(id) {
      const s = findService(id);
      if (!s) return;
      const el = document.getElementById('main');
      const cls = getStatusClass(s.id);
      const r = healthResults[s.id];
      const time = r && r.responseTime ? `${r.responseTime}ms` : '-';
      const checkedAt = r && r.checkedAt ? new Date(r.checkedAt).toLocaleTimeString() : '-';
      const errorMsg = r && r.error ? `<div class="detail-field full-width"><span class="field-label">Error</span><span class="field-value" style="color:var(--error)">${r.error}</span></div>` : '';

      el.innerHTML = `
        <div class="detail-card">
          <div class="detail-header">
            <div class="status-icon-lg ${cls}">${getStatusIcon(s.id, 'lg')}</div>
            <div>
              <div class="detail-title">${s.name}</div>
              <span class="detail-status-label label-${cls}">${getStatusLabel(s.id)}</span>
            </div>
          </div>
          <div class="detail-body">
            <p class="detail-description">${s.description}</p>
            <div class="detail-grid">
              <div class="detail-field full-width">
                <span class="field-label">Base URL</span>
                <span class="field-value"><a href="${s.baseUrl}" target="_blank" rel="noopener">${s.baseUrl}</a></span>
              </div>
              <div class="detail-field">
                <span class="field-label">Health Endpoint</span>
                <span class="field-value"><a href="${s.baseUrl}${s.healthEndpoint}" target="_blank" rel="noopener">${s.healthEndpoint}</a></span>
              </div>
              <div class="detail-field">
                <span class="field-label">Swagger</span>
                <span class="field-value"><a href="${s.baseUrl}${s.swaggerEndpoint}" target="_blank" rel="noopener">${s.swaggerEndpoint}</a></span>
              </div>
              <div class="detail-field">
                <span class="field-label">Auth Type</span>
                <span class="field-value">${s.authType}</span>
              </div>
              <div class="detail-field">
                <span class="field-label">Response Time</span>
                <span class="field-value">${time}</span>
              </div>
              <div class="detail-field">
                <span class="field-label">Last Checked</span>
                <span class="field-value">${checkedAt}</span>
              </div>
              <div class="detail-field">
                <span class="field-label">Group</span>
                <span class="field-value">${s.group === 'orchestration' ? 'Orchestration API' : s.group === 'microservice' ? 'Microservice' : 'Other'}</span>
              </div>
              ${errorMsg}
              <div class="detail-field full-width">
                <span class="field-label">Callers</span>
                <div class="caller-tags">
                  ${s.callers.map(c => `<span class="caller-tag">${c}</span>`).join('')}
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="resources-card">
          <div class="resources-header">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            <span class="resources-title">Resources</span>
          </div>
          <div class="resources-body">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>
            <span class="resources-placeholder-text">Operations and resources for this API will appear here.</span>
          </div>
        </div>`;
    }

    // ── Selection ──
    function selectService(id) {
      selectedId = id;
      renderSidebar();
      renderMain();
    }

    // ── Health checks ──
    async function runHealthChecks() {
      const btn = document.getElementById('refreshBtn');
      btn.classList.add('spinning');

      const services = allServices();

      // Mark all as checking
      for (const s of services) {
        healthResults[s.id] = { status: 'checking' };
      }
      updateCounts();
      renderSidebar();
      renderMain();

      // Run checks concurrently
      const promises = services.map(s => checkHealth(s));
      await Promise.allSettled(promises);

      btn.classList.remove('spinning');
      updateCounts();
      renderSidebar();
      renderMain();
    }

    async function checkHealth(service) {
      const url = service.baseUrl + service.healthEndpoint;
      const start = performance.now();
      try {
        const resp = await fetch(url, {
          method: 'GET',
          mode: 'cors',
          signal: AbortSignal.timeout(10000)
        });
        const elapsed = Math.round(performance.now() - start);
        if (resp.ok) {
          healthResults[service.id] = { status: 'healthy', responseTime: elapsed, checkedAt: Date.now() };
        } else {
          healthResults[service.id] = { status: 'unhealthy', responseTime: elapsed, checkedAt: Date.now(), error: `HTTP ${resp.status}` };
        }
      } catch (e) {
        const elapsed = Math.round(performance.now() - start);
        healthResults[service.id] = { status: 'unhealthy', responseTime: elapsed, checkedAt: Date.now(), error: e.message || 'Network error' };
      }
      // Live update sidebar and main as each check completes
      updateCounts();
      renderSidebar();
      renderMain();
    }

    function updateCounts() {
      const all = allServices();
      let healthy = 0, unhealthy = 0;
      for (const s of all) {
        const r = healthResults[s.id];
        if (r && r.status === 'healthy') healthy++;
        else if (r && r.status === 'unhealthy') unhealthy++;
      }
      document.getElementById('healthyCount').textContent = healthy;
      document.getElementById('unhealthyCount').textContent = unhealthy;
    }

    // ── Init ──
    loadServices();
  </script>
</body>
</html>
