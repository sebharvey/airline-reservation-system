<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apex Air - System Monitor</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="logo">&#9992;</span>
      Apex Air <span style="font-weight:400;opacity:0.8;font-size:14px;">System Monitor</span>
    </div>
    <div class="header-right">
      <div class="summary-badge" id="summaryHealthy">
        <div class="summary-dot" style="background:var(--success)"></div>
        <span id="healthyCount">0</span> <span>Healthy</span>
      </div>
      <div class="summary-badge" id="summaryUnhealthy">
        <div class="summary-dot" style="background:var(--error)"></div>
        <span id="unhealthyCount">0</span> <span>Unhealthy</span>
      </div>
      <button class="secret-btn" id="secretBtn" onclick="openSecretModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        <span id="secretBtnLabel">Add Secret</span>
      </button>
      <button class="refresh-btn" id="refreshBtn" onclick="runHealthChecks()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
        Refresh
      </button>
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">&#127769;</button>
    </div>
  </div>

  <div class="layout">
    <!-- Sidebar -->
    <div class="sidebar-wrapper">
      <div class="sidebar" id="sidebar"></div>
      <div class="sidebar-footer">
        <button class="logs-btn" onclick="openLogsModal()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
          Logs
          <span class="logs-count-badge" id="logsCountBadge" style="display:none">0</span>
        </button>
      </div>
    </div>

    <!-- Main -->
    <div class="main" id="main"></div>
  </div>

  <!-- Secret Modal -->
  <div class="secret-overlay" id="secretOverlay" style="display:none" onclick="onOverlayClick(event)">
    <div class="secret-modal" onclick="event.stopPropagation()">
      <div class="secret-modal-header">
        <h2>&#128274; Host Key Secret</h2>
        <button class="secret-modal-close" onclick="closeSecretModal()" aria-label="Close">&times;</button>
      </div>
      <div class="secret-modal-body">
        <p>Enter a secret password to use as the Host Key for authenticating non-anonymous microservice endpoints.</p>
        <label class="secret-field-label" for="secretInput">Secret</label>
        <input class="secret-input" id="secretInput" type="password" placeholder="Enter secret..." autocomplete="new-password" oninput="onSecretInput()" onkeydown="onSecretKeyDown(event)" />
        <div class="secret-stored-info" id="secretStoredInfo">&#10003; A secret is currently stored. Saving will replace it.</div>
      </div>
      <div class="secret-modal-footer">
        <button class="secret-cancel-btn" onclick="closeSecretModal()">Cancel</button>
        <button class="secret-save-btn" id="secretSaveBtn" onclick="saveSecret()" disabled>Save</button>
      </div>
    </div>
  </div>

  <!-- Logs Modal -->
  <div class="logs-overlay" id="logsOverlay" style="display:none" onclick="onLogsOverlayClick(event)">
    <div class="logs-modal" onclick="event.stopPropagation()">
      <div class="logs-modal-header">
        <div class="logs-modal-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
          </svg>
          <h2>API Request Logs</h2>
        </div>
        <div class="logs-modal-actions">
          <button class="logs-clear-btn" onclick="clearLogs()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            Clear Logs
          </button>
          <button class="logs-modal-close" onclick="closeLogsModal()" aria-label="Close">&times;</button>
        </div>
      </div>
      <div class="logs-modal-body" id="logsContent">
        <div class="logs-empty">No API calls logged yet.</div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
