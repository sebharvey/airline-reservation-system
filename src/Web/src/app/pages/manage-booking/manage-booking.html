<div class="page fade-in">
  <div class="page-header">
    <span class="page-icon">📋</span>
    <h2>Manage Booking</h2>
    <p>View, change or cancel your reservation</p>
  </div>

  <form class="form" (ngSubmit)="onSubmit()" #formEl="ngForm">
    <div class="field">
      <label for="bookingRef">Booking Reference</label>
      <input
        id="bookingRef"
        type="text"
        placeholder="e.g. AB1234"
        maxlength="8"
        [ngModel]="bookingReference()"
        (ngModelChange)="onReferenceInput($event)"
        name="bookingRef"
        autocomplete="off"
      />
    </div>

    <div class="field">
      <label for="givenName">First Name</label>
      <input
        id="givenName"
        type="text"
        placeholder="Enter your first name"
        [ngModel]="givenName()"
        (ngModelChange)="givenName.set($event)"
        name="givenName"
        autocomplete="given-name"
      />
    </div>

    <div class="field">
      <label for="surname">Last Name</label>
      <input
        id="surname"
        type="text"
        placeholder="Enter your last name"
        [ngModel]="surname()"
        (ngModelChange)="surname.set($event)"
        name="surname"
        autocomplete="family-name"
      />
    </div>

    @if (errorMessage()) {
      <div class="error-banner">
        <span class="error-icon"><lucide-icon name="triangle-alert" [size]="14" /></span>
        {{ errorMessage() }}
      </div>
    }

    <button
      type="submit"
      class="btn-primary"
      [disabled]="!isFormValid || loading()"
    >
      @if (loading()) {
        <span class="spinner"></span> Retrieving&hellip;
      } @else {
        Retrieve Booking
      }
    </button>
  </form>

</div>
