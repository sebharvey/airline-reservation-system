<div class="page fade-in">
  <div class="hero">
    <div class="clouds" aria-hidden="true">
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>
      <div class="cloud cloud-3"></div>
      <div class="cloud cloud-4"></div>
    </div>
    <div class="logo"><lucide-icon name="plane" [size]="32" /></div>
    <h1>Apex Air</h1>
    <p class="tagline">Fly smarter. Arrive better.</p>
  </div>

  <!-- Flight Search Panel -->
  <div class="search-panel">
    <h2 class="search-title">Find Your Flight</h2>

    <!-- Booking Type Toggle -->
    <div class="booking-type-toggle">
      <button
        type="button"
        class="booking-type-btn"
        [class.active]="bookingType === 'Revenue'"
        (click)="bookingType = 'Revenue'">
        Book with Money
      </button>
      <button
        type="button"
        class="booking-type-btn reward"
        [class.active]="bookingType === 'Reward'"
        (click)="bookingType = 'Reward'">
        Book with Points
      </button>
    </div>

    <!-- Trip Type Toggle -->
    <div class="trip-type-toggle">
      <button
        type="button"
        class="trip-btn"
        [class.active]="tripType === 'one-way'"
        (click)="tripType = 'one-way'">
        One Way
      </button>
      <button
        type="button"
        class="trip-btn"
        [class.active]="tripType === 'return'"
        (click)="tripType = 'return'">
        Return
      </button>
    </div>

    <form (ngSubmit)="onSearch()" class="search-form">

      <!-- Origin & Destination -->
      <div class="field-row">

        <!-- Origin combobox -->
        <div class="field">
          <label for="origin-input">From</label>
          <app-airport-combobox
            inputId="origin-input"
            placeholder="City or code"
            [(ngModel)]="origin"
            name="origin">
          </app-airport-combobox>
        </div>

        <div class="swap-icon" title="Swap airports" (click)="swapAirports()" style="cursor:pointer"><lucide-icon name="arrow-left-right" [size]="18" /></div>

        <!-- Destination combobox -->
        <div class="field">
          <label for="destination-input">To</label>
          <app-airport-combobox
            inputId="destination-input"
            placeholder="City or code"
            [(ngModel)]="destination"
            name="destination">
          </app-airport-combobox>
        </div>

      </div>

      <!-- Dates -->
      <div class="field-row">
        <div class="field">
          <label for="departDate">Departure</label>
          <input
            id="departDate"
            type="date"
            [(ngModel)]="departDate"
            name="departDate"
            [min]="today"
            (change)="onDepartDateChange()"
            required />
        </div>

        <div class="field" [class.field-hidden]="!isReturn">
          <label for="returnDate">Return</label>
          <input
            id="returnDate"
            type="date"
            [(ngModel)]="returnDate"
            name="returnDate"
            [min]="departDate || today"
            [required]="isReturn"
            [disabled]="!isReturn" />
        </div>
      </div>

      <!-- Passengers -->
      <div class="field-row passengers-row">
        <div class="field passenger-field">
          <label>Adults <span class="age-note">(16+)</span></label>
          <div class="counter">
            <button type="button" class="counter-btn" (click)="decrementAdults()" [disabled]="adults <= 1">−</button>
            <span class="counter-val">{{ adults }}</span>
            <button type="button" class="counter-btn" (click)="incrementAdults()" [disabled]="adults >= 9">+</button>
          </div>
        </div>

        <div class="field passenger-field">
          <label>Children <span class="age-note">(2–15)</span></label>
          <div class="counter">
            <button type="button" class="counter-btn" (click)="decrementChildren()" [disabled]="children <= 0">−</button>
            <span class="counter-val">{{ children }}</span>
            <button type="button" class="counter-btn" (click)="incrementChildren()" [disabled]="children >= 9">+</button>
          </div>
        </div>
      </div>

      <button
        type="submit"
        class="search-btn"
        [disabled]="!origin || !destination || !departDate || (isReturn && !returnDate)">
        Search Flights
      </button>
    </form>
  </div>

  <!-- Quick Links -->
  <div class="quick-links">
    <a routerLink="/check-in" class="card-link">
      <span class="icon">🎫</span>
      <span class="label">Check In</span>
      <span class="arrow">›</span>
    </a>
    <a routerLink="/manage-booking" class="card-link">
      <span class="icon">📋</span>
      <span class="label">Manage Booking</span>
      <span class="arrow">›</span>
    </a>
    <a routerLink="/flight-status" class="card-link">
      <span class="icon">📡</span>
      <span class="label">Flight Status</span>
      <span class="arrow">›</span>
    </a>
    <a routerLink="/loyalty" class="card-link">
      <span class="icon">⭐</span>
      <span class="label">Loyalty Login</span>
      <span class="arrow">›</span>
    </a>
  </div>
</div>
