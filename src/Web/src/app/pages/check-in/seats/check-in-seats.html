<div class="page fade-in">
  <div class="page-header">
    <h2>Select Your Seat</h2>
    <p>Seat selection during online check-in</p>
  </div>

  <div class="unavailable-panel">
    <div class="unavailable-icon">&#9940;</div>
    <p class="unavailable-message">Unavailable</p>
    <p class="unavailable-sub">Online seat selection is not available at this time. You can select a seat at the airport.</p>
  </div>

  <div class="action-buttons">
    <button type="button" class="btn-primary" disabled>Continue</button>
    <button type="button" class="btn-secondary" (click)="skip()">Skip Seats</button>
  </div>
</div>
