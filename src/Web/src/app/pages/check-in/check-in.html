<div class="page fade-in">
  <div class="page-header">
    <span class="page-icon">&#9992;</span>
    <h2>Online Check-In</h2>
    <p>Check in for your flight and get your boarding pass</p>
  </div>

  <form class="form" (ngSubmit)="onSubmit()" #formEl="ngForm">
    <div class="field">
      <label for="bookingRef">Booking Reference</label>
      <input
        id="bookingRef"
        type="text"
        placeholder="e.g. AB1234"
        maxlength="8"
        [ngModel]="bookingReference()"
        (ngModelChange)="onReferenceInput($event)"
        name="bookingRef"
        autocomplete="off"
      />
    </div>

    <div class="field">
      <label for="givenName">First Name</label>
      <input
        id="givenName"
        type="text"
        placeholder="Enter your first name"
        [ngModel]="givenName()"
        (ngModelChange)="givenName.set($event)"
        name="givenName"
        autocomplete="given-name"
      />
    </div>

    <div class="field">
      <label for="surname">Last Name</label>
      <input
        id="surname"
        type="text"
        placeholder="Enter your last name"
        [ngModel]="surname()"
        (ngModelChange)="surname.set($event)"
        name="surname"
        autocomplete="family-name"
      />
    </div>

    <div class="field">
      <label for="airport-input">Departure Airport</label>
      <div class="airport-combobox" [class.open]="showAirportDropdown">
        <div class="combobox-input-wrap">
          <input
            id="airport-input"
            type="text"
            placeholder="City or airport code"
            [(ngModel)]="airportQuery"
            name="departureAirport"
            autocomplete="off"
            (input)="onAirportQueryInput()"
            (focus)="showAirportDropdown = true"
          />
          <button type="button" class="combobox-toggle" (click)="toggleAirportDropdown()" tabindex="-1" aria-label="Show airports">
            <span class="chevron" [class.up]="showAirportDropdown">&#x2303;</span>
          </button>
        </div>
        <ul class="combobox-list" *ngIf="showAirportDropdown">
          <li
            *ngFor="let airport of airportSuggestions"
            (mousedown)="selectAirport(airport)"
            [class.selected]="airport.code === departureAirport()">
            <span class="airport-code">{{ airport.code }}</span>
            <span class="airport-city">{{ airport.city }}</span>
          </li>
          <li *ngIf="airportSuggestions.length === 0" class="no-results">No airports found</li>
        </ul>
      </div>
    </div>

    @if (errorMessage()) {
      <div class="error-banner">
        <span class="error-icon">&#9888;</span>
        {{ errorMessage() }}
      </div>
    }

    <button
      type="submit"
      class="btn-primary"
      [disabled]="!isFormValid || loading()"
    >
      @if (loading()) {
        <span class="spinner"></span> Checking In&hellip;
      } @else {
        Find My Booking
      }
    </button>
  </form>

  <div class="info-note">
    <span>&#9432;</span> Online check-in is available from 48 hours up to 1 hour before departure.
  </div>
</div>
