<div class="page fade-in">
  <div class="page-header">
    <span class="page-icon">&#127806;</span>
    <h2>Online Check-In</h2>
    <p>Check in for your flight and get your boarding pass</p>
  </div>

  <form class="form" (ngSubmit)="onSubmit()" #formEl="ngForm">
    <div class="field">
      <label for="bookingRef">Booking Reference</label>
      <input
        id="bookingRef"
        type="text"
        placeholder="e.g. AB1234"
        maxlength="8"
        [ngModel]="bookingReference()"
        (ngModelChange)="onReferenceInput($event)"
        name="bookingRef"
        autocomplete="off"
      />
    </div>

    <div class="field">
      <label for="givenName">First Name</label>
      <input
        id="givenName"
        type="text"
        placeholder="Enter your first name"
        [ngModel]="givenName()"
        (ngModelChange)="givenName.set($event)"
        name="givenName"
        autocomplete="given-name"
      />
    </div>

    <div class="field">
      <label for="surname">Last Name</label>
      <input
        id="surname"
        type="text"
        placeholder="Enter your last name"
        [ngModel]="surname()"
        (ngModelChange)="surname.set($event)"
        name="surname"
        autocomplete="family-name"
      />
    </div>

    @if (errorMessage()) {
      <div class="error-banner">
        <span class="error-icon">&#9888;</span>
        {{ errorMessage() }}
      </div>
    }

    <button
      type="submit"
      class="btn-primary"
      [disabled]="!isFormValid || loading()"
    >
      @if (loading()) {
        <span class="spinner"></span> Checking In&hellip;
      } @else {
        Find My Booking
      }
    </button>
  </form>

  <div class="info-note">
    <span>&#9432;</span> Online check-in is available from 48 hours up to 1 hour before departure.
  </div>

  <div class="hint-section">
    <p class="hint-title">Demo bookings</p>
    <div class="hint-list">
      @for (hint of demoHints; track hint.ref) {
        <button type="button" class="hint-chip" (click)="fillDemo(hint)">
          <span class="hint-ref">{{ hint.ref }}</span>
          <span class="hint-name">{{ hint.name }}</span>
        </button>
      }
    </div>
  </div>
</div>
