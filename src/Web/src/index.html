<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Apex Air</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <!-- Favicons -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png">

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="apple-icon.png">
  <link rel="apple-touch-icon" sizes="57x57" href="apple-icon-57x57.png">
  <link rel="apple-touch-icon" sizes="60x60" href="apple-icon-60x60.png">
  <link rel="apple-touch-icon" sizes="72x72" href="apple-icon-72x72.png">
  <link rel="apple-touch-icon" sizes="76x76" href="apple-icon-76x76.png">
  <link rel="apple-touch-icon" sizes="114x114" href="apple-icon-114x114.png">
  <link rel="apple-touch-icon" sizes="120x120" href="apple-icon-120x120.png">
  <link rel="apple-touch-icon" sizes="144x144" href="apple-icon-144x144.png">
  <link rel="apple-touch-icon" sizes="152x152" href="apple-icon-152x152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-icon-180x180.png">
  <link rel="apple-touch-icon-precomposed" href="apple-icon-precomposed.png">

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#5a3eab">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Apex Air">
  <meta name="application-name" content="Apex Air">

  <!-- Microsoft Tiles -->
  <meta name="msapplication-TileColor" content="#5a3eab">
  <meta name="msapplication-TileImage" content="ms-icon-144x144.png">
  <meta name="msapplication-config" content="browserconfig.xml">
  <style>
    /* Splash screen — hidden on desktop, shown on mobile only */
    #splash {
      display: none;
    }

    @media (max-width: 900px) {
      #splash {
        display: flex;
        position: fixed;
        inset: 0;
        /* Extend behind the Dynamic Island / notch on iOS */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        z-index: 9999;
        background: linear-gradient(135deg, #667eea 0%, #5a3eab 50%, #764ba2 100%);
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        opacity: 1;
        transition: opacity 0.5s ease;
      }

      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .splash-logo-wrap {
        position: relative;
        width: 100px;
        height: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .splash-logo {
        font-size: 52px;
        line-height: 1;
        position: relative;
        z-index: 1;
        color: #ffffff;
        filter: brightness(0) invert(1);
      }

      .splash-spinner {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.25);
        border-top-color: #ffffff;
        animation: splash-spin 1s linear infinite;
      }

      .splash-title {
        color: #ffffff;
        font-size: 30px;
        font-weight: 700;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        letter-spacing: 1px;
        margin: 0;
      }

      .splash-tagline {
        color: rgba(255, 255, 255, 0.72);
        font-size: 14px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        margin: 0;
      }

      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
    }
  </style>
</head>
<body>
  <div id="splash" aria-hidden="true">
    <div class="splash-logo-wrap">
      <span class="splash-logo">✈</span>
      <div class="splash-spinner"></div>
    </div>
    <p class="splash-title">Apex Air</p>
    <p class="splash-tagline">Getting ready for takeoff…</p>
  </div>

  <app-root></app-root>

  <script>
    (function () {
      var splash = document.getElementById('splash');
      if (!splash) return;
      // Only run on mobile — CSS hides it on desktop but remove the timeout overhead too
      if (window.innerWidth > 900) { splash.remove(); return; }
      setTimeout(function () {
        splash.classList.add('fade-out');
        setTimeout(function () { splash.remove(); }, 500);
      }, 3000);
    })();
  </script>
</body>
</html>
