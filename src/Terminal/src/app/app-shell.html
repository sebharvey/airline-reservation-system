<!-- Mobile overlay backdrop -->
@if (sidebarOpen()) {
  <div class="sidebar-backdrop" (click)="closeSidebar()" aria-hidden="true"></div>
}

<div class="shell">

  <!-- ── Top bar ── -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="burger" (click)="toggleSidebar()" [attr.aria-expanded]="sidebarOpen()" aria-label="Toggle navigation">
        <span class="burger-line"></span>
        <span class="burger-line"></span>
        <span class="burger-line"></span>
      </button>
      <span class="topbar-brand"><lucide-icon name="plane" [size]="15" class="brand-plane" /> Apex Air <span class="topbar-product">Terminal</span></span>
    </div>

    <div class="topbar-right">
      @if (auth.currentUser(); as user) {
        <div class="agent-badge">
          <lucide-icon name="user" [size]="16" class="agent-icon" />
          <span class="agent-info">
            <span class="agent-name">{{ user.displayName }}</span>
            <span class="agent-meta">{{ user.username }}</span>
          </span>
        </div>
      }

      <button
        class="theme-toggle"
        (click)="theme.toggle()"
        [attr.aria-label]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
        title="Toggle theme"
      >
        <lucide-icon [name]="theme.isDark() ? 'sun' : 'moon'" [size]="16" class="toggle-icon" />
        <span class="toggle-track" [class.is-dark]="theme.isDark()">
          <span class="toggle-thumb"></span>
        </span>
      </button>

      <button class="logout-btn" (click)="logout()" title="Sign out">
        <lucide-icon name="log-out" [size]="15" />
        <span class="logout-label">Sign out</span>
      </button>
    </div>
  </header>

  <div class="body">

    <!-- ── Sidebar ── -->
    <aside class="sidebar" [class.open]="sidebarOpen()" [class.nav-collapsed]="navCollapsed()">
      <nav class="sidebar-nav" (click)="closeSidebar()">
        @for (group of navGroups; track group.label) {
          <div class="nav-section" [class.nav-section-bottom]="group.bottom">
            <p class="nav-section-label">{{ group.label }}</p>
            @for (item of group.items; track item.path) {
              <a
                [routerLink]="item.path"
                routerLinkActive="active"
                class="nav-item"
                [attr.title]="item.description"
              >
                <lucide-icon [name]="item.icon" [size]="18" class="nav-icon" />
                <span class="nav-label">{{ item.label }}</span>
              </a>
            }
          </div>
        }
      </nav>

      <div class="sidebar-footer">
        <p class="sidebar-version">Apex Air Terminal v1.0</p>
        <p class="sidebar-copy">© 2026 Apex Air</p>
      </div>
    </aside>

    <!-- ── Main content ── -->
    <main class="main-content">
      <router-outlet />
    </main>

  </div>
</div>
